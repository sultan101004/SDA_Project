spring.application.name=event-management

# Embedded DB (H2) - in-memory, no external or file locks
spring.datasource.url=jdbc:h2:mem:event_management;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Always initialize from SQL files in resources
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# File upload configuration
app.upload.dir=uploads/images

# Static resource handling for images
spring.web.resources.static-locations=file:uploads/images/,classpath:/static/

# JWT Configuration
app.jwt-secret=EventManagementSecretKeyForJWTTokenGeneration2024VerySecure
app.jwt-expiration-milliseconds=86400000

# Mail Configuration (for email simulation)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=demo@gmail.com
spring.mail.password=demo
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
