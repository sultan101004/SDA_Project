spring.application.name=ecom-proj

spring.datasource.url=jdbc:h2:mem:Ecommerce
spring.datasource.password=project1
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.jpa.defer-datasource-initialization=true

# File upload configuration
app.upload.dir=uploads/images

# Static resource handling for images
spring.web.resources.static-locations=file:uploads/images/,classpath:/static/
