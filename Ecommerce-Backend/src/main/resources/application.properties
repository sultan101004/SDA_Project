spring.application.name=event-management

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/event_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# File upload configuration
app.upload.dir=uploads/images

# Static resource handling for images
spring.web.resources.static-locations=file:uploads/images/,classpath:/static/

# JWT Configuration
app.jwt-secret=EventManagementSecretKeyForJWTTokenGeneration2024VerySecure
app.jwt-expiration-milliseconds=86400000

# Mail Configuration (for email simulation)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=demo@gmail.com
spring.mail.password=demo
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
