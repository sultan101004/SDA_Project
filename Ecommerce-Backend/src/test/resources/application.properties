spring.application.name=event-management-test

# Use in-memory H2 database for tests to avoid MySQL dependency
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Do not run schema/data SQL scripts during tests
spring.sql.init.mode=never

# JWT configuration for tests
app.jwt-secret=TestEventManagementSecretKeyForJWTTokenGeneration
app.jwt-expiration-milliseconds=3600000

# Disable mail during tests
spring.mail.host=localhost
spring.mail.port=2525

